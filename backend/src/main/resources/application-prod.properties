# Production profile: minimal logging to reduce CPU usage (was 25-30% with DEBUG/show-sql)
# Activate with: -Dspring.profiles.active=prod (or SPRING_PROFILES_ACTIVE=prod)

# Logging: WARN only. DEBUG was the main cause of high CPU (every request logs full security chain).
logging.level.root=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Do not log every SQL statement (was show-sql=true - very CPU/I/O heavy under load).
spring.jpa.show-sql=false

# Optional: use validate in production instead of update to avoid schema checks on startup (slightly less CPU).
# spring.jpa.hibernate.ddl-auto=validate
